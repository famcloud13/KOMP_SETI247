<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Неупорядоченный список</title>
</head>
<body>

<h2> Список изученных тегов</h2>

<ul>
    <li>html</li>
    <li>head</li>
    <li>body</li>
    <li>h1-h6</li>
    <li>p</li>
    <li>ul</li>
    <li>ol</li>
</ul>
<p>Неупорядоченный список используется для простого
перечисления объектов, когда порядок неважен.</p>

</body>
</html>
