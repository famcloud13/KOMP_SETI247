<!DOCTYPE html>
<html lang="ru">

    <title>Объемный текст WEB</title>

        body {
            background-color: white; /* Фон страницы */
            display: flex; /* Центрирование содержимого */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        pre {

            font-weight: bold;

            line-height: 1.2; 
            white-space: pre-wrap;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

</html>
